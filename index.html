<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Listening — CDI Listening 6</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #fff; --border: #e2ddd6; --border-light: #ede9e3;
    --text-primary: #1a1714; --text-secondary: #5a5550; --text-muted: #9a948e;
    --accent: #1e6b4a; --accent-light: #e8f4ef; --accent-hover: #155438;
    --red: #c0392b; --red-light: #fdf0ef;
    --blue: #1a4a7a; --blue-light: #eef3f9;
    --gold: #8b6914; --gold-light: #fdf8ee;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
  .header-inner { max-width: 920px; margin: 0 auto; padding: 0 18px; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 12px; }
  .header-title { font-family: 'Source Serif 4', serif; font-size: 1rem; font-weight: 600; white-space: nowrap; display: flex; align-items: center; gap: 10px; }
  .header-title small { font-size:0.72rem; font-weight:400; color:var(--text-muted); margin-left:4px; }
  .header-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius); font-family: inherit; font-size: 0.78rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; white-space: nowrap; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); color: var(--text-primary); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .progress-pill { font-size: 0.75rem; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
  .progress-pill span { color: var(--accent); font-weight: 600; }
  .page-wrap { max-width: 920px; margin: 0 auto; padding: 20px 18px 80px; }
  .page-heading { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .page-heading h1 { font-family: 'Source Serif 4', serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 2px; }
  .page-heading p { color: var(--text-muted); font-size: 0.82rem; }
  .start-banner { background: var(--accent); color: #fff; padding: 18px 20px; border-radius: var(--radius-lg); margin-bottom: 20px; text-align: center; box-shadow: var(--shadow-md); }
  .start-banner h3 { font-family: 'Source Serif 4', serif; font-size: 1.15rem; margin-bottom: 4px; }
  .start-banner p { font-size: 0.82rem; opacity: 0.92; margin-bottom: 12px; }
  .btn-start { background: #fff; color: var(--accent); border: none; padding: 10px 30px; border-radius: var(--radius); font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: transform 0.15s; }
  .btn-start:hover { transform: scale(1.04); }
  .part-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 5px; }
  .part-tab { flex: 1; padding: 8px 5px; text-align: center; cursor: pointer; border-radius: 7px; font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); transition: all 0.15s; border: none; background: transparent; font-family: inherit; }
  .part-tab:hover { background: var(--bg); }
  .part-tab.active { background: var(--accent); color: #fff; }
  .part-tab small { display: block; font-size: 0.65rem; opacity: 0.8; margin-top: 2px; font-weight: 500; }
  .audio-sticky { position: sticky; top: 56px; z-index: 95; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; box-shadow: var(--shadow-sm); }
  .audio-sticky audio { flex: 1; min-width: 240px; height: 34px; }
  .audio-label { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
  .audio-label strong { color: var(--accent); }
  .speed-row { display: inline-flex; align-items: center; gap: 3px; }
  .speed-row .label { font-size: 0.7rem; color: var(--text-muted); margin-right: 3px; }
  .speed-btn { border: 1px solid var(--border); background: var(--bg); color: var(--text-secondary); border-radius: 4px; padding: 3px 8px; font-size: 0.72rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .speed-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speed-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .part-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 20px; overflow: hidden; box-shadow: var(--shadow-sm); display: none; }
  .part-section.active { display: block; }
  .part-header { padding: 12px 18px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; background: #fafaf8; flex-wrap: wrap; }
  .part-badge { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #fff; background: var(--accent); padding: 2px 8px; border-radius: 4px; }
  .part-range { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
  .part-body { padding: 18px; }
  .section-title { font-family: 'Source Serif 4', serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
  .instruction { font-size: 0.9rem; color: var(--text-primary); margin-bottom: 12px; font-weight: 500; }
  .instruction strong { font-weight: 700; }
  .data-table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 12px 0; background: #fff; }
  .data-table-title { background: var(--accent); color: #fff; text-align: center; padding: 8px 14px; font-family: 'Source Serif 4', serif; font-size: 0.95rem; font-weight: 600; }
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table td { padding: 10px; font-size: 0.82rem; vertical-align: middle; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
  .data-table td:first-child { font-weight: 600; color: var(--text-primary); width: 35%; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table .static-val { font-style: italic; color: var(--text-muted); }
  input[type="text"].ans-input { border: 1.5px solid var(--border); border-radius: 5px; padding: 3px 8px; font-family: inherit; font-size: 0.82rem; color: var(--text-primary); background: #fff; outline: none; width: 120px; transition: border-color 0.15s; vertical-align: middle; }
  input[type="text"].ans-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(30,107,74,0.1); }
  input[type="text"].ans-input.correct { border-color: var(--accent); background: var(--accent-light); }
  input[type="text"].ans-input.incorrect { border-color: var(--red); background: var(--red-light); }
  select.ans-input { border:1.5px solid var(--border); border-radius:5px; padding:3px 6px; font-family:inherit; font-size:0.82rem; color:var(--text-primary); background:#fff; outline:none; width:70px; }
  .qnum-prefix { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 20px; background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 0.7rem; font-weight: 700; margin-right: 4px; }
  .mcq-group { margin: 10px 0 14px; }
  .mcq-question { font-size: 0.88rem; margin-bottom: 6px; line-height: 1.5; font-weight: 600; color: var(--text-primary); }
  .mcq-question .qnum { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: var(--accent-light); color: var(--accent); border-radius: 50%; font-size: 0.72rem; font-weight: 700; margin-right: 6px; }
  .mcq-options { display: flex; flex-direction: column; gap: 5px; }
  .mcq-option { display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 7px; cursor: pointer; transition: all 0.15s; font-size: 0.82rem; color: var(--text-secondary); background: var(--bg); }
  .mcq-option:hover { border-color: var(--accent); background: var(--accent-light); color: var(--text-primary); }
  .mcq-option input[type="radio"] { display: none; }
  .mcq-radio { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .mcq-option.selected { border-color: var(--accent); background: var(--accent-light); color: var(--text-primary); }
  .mcq-option.selected .mcq-radio { border-color: var(--accent); background: var(--accent); }
  .mcq-option.selected .mcq-radio::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #fff; position: absolute; }
  .opt-letter { font-weight: 600; color: var(--text-muted); min-width: 14px; font-size: 0.76rem; }
  .mcq-option.selected .opt-letter { color: var(--accent); }
  .notes-card { background: var(--gold-light); border: 1px solid #e8d8a0; border-radius: var(--radius); padding: 14px 18px; margin: 12px 0; }
  .notes-card h4 { font-family: 'Source Serif 4', serif; font-size: 0.95rem; font-weight: 600; text-align: center; margin-bottom: 10px; }
  .notes-card ul { list-style: none; padding-left: 4px; }
  .notes-card ul li { padding: 4px 0; font-size: 0.88rem; color: var(--text-primary); line-height: 1.6; }
  .notes-card ul li::before { content: "•"; color: var(--gold); margin-right: 6px; }
  .q-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 14px 0 8px; }
  .opt-list { list-style:none; }
  .opt-list li { padding:4px 0; font-size:0.82rem; color:var(--text-secondary); }
  .opt-list li b { display:inline-block; width:20px; color:var(--accent); }
  .map-wrap { margin:12px 0; overflow-x:auto; }
  .map-wrap svg { max-width:100%; height:auto; }
  .submit-wrap { text-align: center; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border); }
  .btn-submit { padding: 10px 32px; font-size: 0.9rem; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(30,107,74,0.25); }
  .btn-submit:hover { background: var(--accent-hover); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 28px 30px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .modal-score { font-family: 'Source Serif 4', serif; font-size: 2.8rem; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .modal-total { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }
  .modal-band { display: inline-block; background: var(--accent-light); color: var(--accent); font-weight: 600; font-size: 0.85rem; padding: 5px 16px; border-radius: 20px; margin-bottom: 14px; }
  .modal-close { padding: 8px 18px; border-radius: var(--radius); background: var(--bg); border: 1px solid var(--border); font-size: 0.82rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; }
  .modal-close:hover { background: var(--surface); border-color: var(--accent); }
  .answer-row { display: grid; grid-template-columns: 50px 1fr 1fr; gap: 10px; padding: 7px 10px; border: 1px solid var(--border-light); border-radius: var(--radius); margin-bottom: 6px; align-items: center; background: var(--surface); font-size:0.82rem; }
  .answer-row.correct { border-color: var(--accent); background: var(--accent-light); }
  .answer-row.incorrect { border-color: var(--red); background: var(--red-light); }
  .answer-q { font-weight:600; color:var(--text-muted); }
  .answer-correct { color:var(--accent); font-weight:500; }
  .summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; padding: 12px; background: linear-gradient(135deg, var(--accent-light), #fff); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .stat-item { text-align: center; }
  .stat-value { font-family: 'Source Serif 4', serif; font-size: 1.4rem; font-weight: 600; line-height: 1.1; }
  .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
  .stat-correct .stat-value { color: var(--accent); }
  .stat-wrong .stat-value { color: var(--red); }
  .stat-band .stat-value { color: var(--gold); }
  @media(max-width:600px){
    .header-inner{padding:0 12px;gap:8px}.header-title{font-size:0.85rem}
    .header-actions{gap:4px}.btn{padding:5px 8px;font-size:0.72rem}
    .page-wrap{padding:14px 12px 100px}
    .page-heading h1{font-size:1.2rem}
    .part-body{padding:12px}.part-header{padding:10px 14px}
    .data-table td{padding:7px;font-size:0.78rem}
    .audio-sticky{padding:8px 10px;gap:6px}
    .audio-sticky audio{min-width:160px;height:30px}
    input[type="text"].ans-input{width:90px;font-size:0.78rem}
    .part-tab{font-size:0.72rem;padding:6px 4px}
    .mcq-question{font-size:0.82rem}.mcq-option{padding:5px 8px;font-size:0.78rem}
    .notes-card ul li{font-size:0.82rem}
    .answer-row{grid-template-columns:40px 1fr 1fr;font-size:0.75rem}
  }
</style>
</head>
<body>
<div class="site-header">
  <div class="header-inner">
    <div class="header-title">🎧 Mock Listening <small>CDI 6</small></div>
    <div class="header-actions">
      <span class="progress-pill" id="progressPill">Progress: <span id="progCount">0</span>/40</span>
      <button class="btn btn-ghost" onclick="resetTest()">↻ Reset</button>
      <button class="btn btn-primary" onclick="submitTest()">✓ Submit</button>
    </div>
  </div>
</div>
<div class="page-wrap">
  <div class="page-heading">
    <h1>CDI Listening 6</h1>
    <p>40 questions across 4 sections.</p>
  </div>
  <div id="mainContent">
  <div class="start-banner">
    <h3>🎧 Ready to start?</h3>
    <p>Play each section once. Read questions before the audio starts.</p>
    <button class="btn-start" onclick="startTest()">▶ Start Test</button>
  </div>
  </div>
</div>

<script>
const SEC_AUDIO = ['section1.mp3','section2.mp3','section3.mp3','section4.mp3'];
const SEC_NAMES = ['Section 1','Section 2','Section 3','Section 4'];
const ANSWERS={1:'travel',2:'teaching',3:'9.15 am',4:'guide',5:'coach',6:'garden',7:'guitar',8:'farm',9:'friends',10:'supermarket',11:'C',12:'A',13:'A',14:'B',15:'C',16:'H',17:'B',18:'I',19:'A',20:'E',21:'B',22:'A',23:'B',24:'C',25:'C',26:'A',27:'F',28:'C',29:'A',30:'B',31:'ocean',32:'depth',33:'plants',34:'rice',35:'A',36:'A',37:'B',38:'A',39:'shellfish',40:'spring'};
const ALTS={3:['9.15','9:15','9.15am','9:15am']};
const TOTAL=40;
const RANGES={1:[1,10],2:[11,20],3:[21,30],4:[31,40]};

let curSec=0, answers={}, submitted=false;

function $(id){return document.getElementById(id)}

function startTest(){
  let html='<div class="part-tabs" id="partTabs">';
  for(let i=1;i<=4;i++){
    html+='<button class="part-tab'+(i===1?' active':'')+'" onclick="switchSec('+i+')">Section '+i+'<small>Q '+(i*10-9)+'–'+(i*10)+'</small></button>';
  }
  html+='</div>';
  html+='<div class="audio-sticky"><span class="audio-label">🎵 <strong id="secLabel">Section 1</strong></span><audio id="audioPlayer" controls preload="auto"></audio><div class="speed-row"><span class="label">Speed:</span><button class="speed-btn" onclick="setSpeed(0.75,this)">0.75×</button><button class="speed-btn active" onclick="setSpeed(1,this)">1×</button><button class="speed-btn" onclick="setSpeed(1.25,this)">1.25×</button><button class="speed-btn" onclick="setSpeed(1.5,this)">1.5×</button></div></div>';
  for(let s=1;s<=4;s++){
    html+='<div class="part-section'+(s===1?' active':'')+'" id="sec'+s+'">';
    html+='<div class="part-header"><span class="part-badge">Section '+s+'</span><span class="part-range">Questions '+(s*10-9)+'–'+(s*10)+'</span></div>';
    html+='<div class="part-body" id="secBody'+s+'"></div></div>';
  }
  html+='<div class="submit-wrap" id="submitWrap" style="display:none"><button class="btn-submit" onclick="submitTest()">✓ Submit Answers</button></div>';
  $('mainContent').innerHTML=html;
  curSec=1;
  $('audioPlayer').src=SEC_AUDIO[0];
  $('audioPlayer').load();
  renderSec(1);
}

function renderSec(s){
  curSec=s;
  $('secLabel').textContent='Section '+s;
  $('audioPlayer').src=SEC_AUDIO[s-1];
  $('audioPlayer').load();
  document.querySelectorAll('.part-section').forEach(e=>e.classList.toggle('active',e.id==='sec'+s));
  document.querySelectorAll('.part-tab').forEach(b=>b.classList.toggle('active',+b.dataset.sec===s||(!b.dataset.sec&&Array.from(document.querySelectorAll('.part-tab')).indexOf(b)+1===s)));
  let html='';
  if(s===1) html=renderSec1();
  else if(s===2) html=renderSec2();
  else if(s===3) html=renderSec3();
  else if(s===4) html=renderSec4();
  $('secBody'+s).innerHTML=html;
  updateProg();
  showSubmit();
}

// Section data
function renderSec1(){
  return '<div class="notes-card"><h4>Volunteer work application form: Grace Brown</h4><ul><li><b>Mobile phone:</b> 021 636 7189</li><li><b>Email:</b> graceb@ <span class="qnum-prefix">1</span><input type="text" class="ans-input" id="q1" placeholder="1" oninput="saveA(1)"> .co.nz</li></ul><ul><li><span class="qnum-prefix">2</span> a diploma in <input type="text" class="ans-input" id="q2" placeholder="2" oninput="saveA(2)"></li><li><span class="qnum-prefix">3</span> from <input type="text" class="ans-input" id="q3" placeholder="3" oninput="saveA(3)"> am to 2 pm</li></ul><ul><li><span class="qnum-prefix">4</span> a volunteer city <input type="text" class="ans-input" id="q4" placeholder="4" oninput="saveA(4)"></li><li><span class="qnum-prefix">5</span> a volunteer netball team <input type="text" class="ans-input" id="q5" placeholder="5" oninput="saveA(5)"></li><li>at Rugby World Cup</li></ul><ul><li><span class="qnum-prefix">6</span> likes to work in her <input type="text" class="ans-input" id="q6" placeholder="6" oninput="saveA(6)"></li><li>enjoys flower arranging</li><li><span class="qnum-prefix">7</span> plays the <input type="text" class="ans-input" id="q7" placeholder="7" oninput="saveA(7)"></li></ul><ul><li><span class="qnum-prefix">8</span> working on a <input type="text" class="ans-input" id="q8" placeholder="8" oninput="saveA(8)"> for a month</li><li>working in a community centre with elderly people</li></ul><ul><li><span class="qnum-prefix">9</span> wants to have more <input type="text" class="ans-input" id="q9" placeholder="9" oninput="saveA(9)"></li><li>wants to help others</li></ul><ul><li><span class="qnum-prefix">10</span> advertisement at the <input type="text" class="ans-input" id="q10" placeholder="10" oninput="saveA(10)"></li></ul></div>';
}
function renderSec2(){
  let html='';
  let mcq=[{n:11,q:'What should employees bring to work?',o:['A gloves','B lunch','C water']},{n:12,q:'If employees can\'t come to work, they should',o:['A contact the duty manager','B leave a phone message','C call their team leader']},{n:13,q:'One problem with customers that may occur now is',o:['A they fail to return baskets','B they eat fruit before paying','C they can be unsure about prices']},{n:14,q:'One benefit of working at the farm is',o:['A friends get a small discount','B employees get free fresh fruit','C discount on gift items']}];
  mcq.forEach(m=>{
    html+='<div class="mcq-group"><div class="mcq-question"><span class="qnum">'+m.n+'</span>'+m.q+'</div><div class="mcq-options">';
    m.o.forEach(o=>{
      let l=o[0];html+='<label class="mcq-option" onclick="selMCQ('+m.n+',\''+l+'\',this)"><input type="radio" name="q'+m.n+'" value="'+l+'"><span class="mcq-radio"></span><span class="opt-letter">'+l+')</span>'+o.substring(2)+'</label>';
    });
    html+='</div></div>';
  });
  html+='<div class="q-label">Questions 15–20 — Label the map</div>';

function selMCQ(n,v,el){
  document.querySelectorAll('input[name="q'+n+'"]').forEach(r=>r.checked=false);
  document.querySelectorAll('.mcq-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked=true;
  answers[n]=v;
  updateProg();
}

function saveA(n){
  let el=document.getElementById('q'+n);
  if(!el)return;
  answers[n]=el.value.trim();
  updateProg();
}

function getA(n){
  if(answers[n])return answers[n];
  let el=document.getElementById('q'+n);
  if(!el)return '';
  if(el.tagName==='SELECT'||el.tagName==='INPUT') return el.value.trim();
  let r=document.querySelector('input[name="q'+n+'"]:checked');
  return r?r.value:'';
}

function updateProg(){
  let cnt=0;
  for(let i=1;i<=TOTAL;i++){let v=getA(i);if(v){cnt++;}}
  $('progCount').textContent=cnt;
  document.querySelectorAll('.part-tab').forEach((b,i)=>{let s=i+1;let r=RANGES[s];let c=0;for(let j=r[0];j<=r[1];j++){if(getA(j))c++;}b.innerHTML='Section '+(i+1)+'<small>'+c+'/'+10+'</small>';});
}
function switchSec(n){renderSec(n);}
function showSubmit(){let w=$('submitWrap');if(w)w.style.display=(curSec===4?'block':'none');}
function setSpeed(v,el){
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('audioPlayer').playbackRate=v;
}
function checkAns(n){
  let a=getA(n).toLowerCase().replace(/\s+/,' ').trim();
  let c=String(ANSWERS[n]).toLowerCase().replace(/\s+/,' ').trim();
  if(a===c)return true;
  if(ALTS[n])return ALTS[n].some(x=>a===x.toLowerCase().replace(/\s+/,' ').trim());
  return false;
}
function submitTest(){
  submitted=true;
  let score=0,h='';
  for(let i=1;i<=TOTAL;i++){
    let ok=checkAns(i);if(ok)score++;
    let ua=getA(i)||'—';
    let cls=ok?'correct':'incorrect';
    if(!getA(i))cls='';
    h+='<div class="answer-row '+cls+'"><span class="answer-q">'+i+'</span><span>'+(getA(i)||'<em style="color:var(--text-muted)">no answer</em>')+'</span><span class="answer-correct">'+ANSWERS[i]+'</span></div>';

  $('mainContent').innerHTML='<div class="summary-stats"><div class="stat-item stat-correct"><div class="stat-value">'+score+'/'+TOTAL+'</div><div class="stat-label">Score</div></div><div class="stat-item stat-band"><div class="stat-value">'+bands[score]+'</div><div class="stat-label">Band</div></div><div class="stat-item stat-wrong"><div class="stat-value">'+(TOTAL-score)+'</div><div class="stat-label">Incorrect</div></div></div><div class="page-heading"><h1>📄 Answer Key</h1></div>'+h+'<div style="text-align:center;margin-top:16px"><button class="btn btn-ghost" onclick="resetTest()">↻ Retake</button> <button class="btn btn-primary" onclick="location.reload()">← Home</button></div>';
}
function resetTest(){
  answers={};submitted=false;
  document.querySelectorAll('input[type="text"].ans-input').forEach(e=>e.value='');
